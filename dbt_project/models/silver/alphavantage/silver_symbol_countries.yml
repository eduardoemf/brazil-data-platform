version: 2

models:
  - name: symbol_countries
    description: >
      Tabela com a sigla dos países de origem dos ativos analisados

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - symbol
              - country

    constraints:
      - type: primary_key
        columns: [symbol, country]

    columns:
      - name: symbol
        description: "Código do ativo (ticker)"
        tests:
          - not_null

      - name: country
        description: "Sigla do país de origem"
        tests:
          - not_null